<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - The Fluffy Kingdom</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-logo">The Fluffy Kingdom</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="news.html">News</a>
      <a href="staff.html">Staff</a>
      <a href="support.html">Support</a>
      <a href="ban-appeal.html">Ban Appeal</a>
      <a href="partnerships.html">Partnerships</a>
      <a href="info.html">Info</a>
      <a href="leaderboards.html">Leaderboards</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <main class="hero" style="padding-top: 120px; padding-bottom: 80px;">
    <div class="hero-content" id="profileContent" style="max-width: 1100px;">
      <h1>Profile</h1>
      <p>Loading your profile...</p>
    </div>
  </main>

  <script>
    const CORE_API_BASE = "https://core-production-7b06.up.railway.app";
    const profileContent = document.getElementById("profileContent");
    const savedUser = localStorage.getItem("fluffyUser");

    function formatVoiceTime(totalSeconds) {
      const seconds = Number(totalSeconds || 0);
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);

      if (hours <= 0 && minutes <= 0) return "0m";
      if (hours <= 0) return `${minutes}m`;
      if (minutes <= 0) return `${hours}h`;
      return `${hours}h ${minutes}m`;
    }

    function statCard(label, value) {
      return `
        <div class="staff-card" style="text-align:center;">
          <h3 class="staff-role" style="font-size:22px; margin-bottom:8px;">${label}</h3>
          <p class="staff-members" style="font-size:28px; font-weight:700;">${value}</p>
        </div>
      `;
    }

    async function loadProfile() {
      if (!savedUser) {
        profileContent.innerHTML = `
          <h1>Profile</h1>
          <p>You need to log in with Discord to view your profile.</p>
          <div class="hero-buttons" style="margin-top: 28px;">
            <a class="btn primary" href="login.html">Login with Discord</a>
          </div>
        `;
        return;
      }

      const user = JSON.parse(savedUser);

      try {
        const response = await fetch(`${CORE_API_BASE}/api/profile?userId=${encodeURIComponent(user.id)}`);
        const result = await response.json();

        if (!result.ok) {
          profileContent.innerHTML = `
            <h1>Profile</h1>
            <p>Error loading profile.</p>
            <p>${result.error}${result.details ? " - " + result.details : ""}</p>
          `;
          return;
        }

        const identity = result.identity;
        const profile = result.profile;
        const badges = result.badges || [];
        const inventory = result.inventory || [];

        profileContent.innerHTML = `
          <h1>Profile</h1>

          <div class="staff-card" style="max-width: 900px; margin: 28px auto 0 auto; text-align:center;">
            ${identity.avatar ? `<img src="${identity.avatar}" alt="Avatar" style="width:110px;height:110px;border-radius:50%;border:3px solid rgba(255,255,255,0.9);object-fit:cover;margin-bottom:18px;">` : ""}
            <h2 class="staff-role" style="font-size:34px;">${identity.nickname || identity.globalName || identity.username}</h2>
            <p class="staff-members" style="margin-top:10px;">@${identity.username}</p>

            ${profile.bio ? `<p style="margin-top:20px;">${profile.bio}</p>` : ""}

            <div class="staff-grid" style="margin-top: 30px;">
              ${statCard("Level", profile.level)}
              ${statCard("XP", profile.xp)}
              ${statCard("Reputation", profile.reputation)}
              ${statCard("Coins", profile.coins)}
              ${statCard("Season Coins", profile.seasonCoins)}
              ${statCard("Highest Level", profile.highestLevelEver)}
              ${statCard("Messages", profile.totalMessages)}
              ${statCard("Voice Time", formatVoiceTime(profile.totalVoiceSeconds))}
            </div>
          </div>

          <div class="staff-grid" style="margin-top: 34px;">
            <div class="staff-card" style="text-align:left;">
              <h2 class="staff-role">Profile Details</h2>
              <p class="staff-members"><strong>Pronouns:</strong> ${profile.pronouns || "Not set"}</p>
              <p class="staff-members"><strong>Favorite:</strong> ${profile.favorite || "Not set"}</p>
              <p class="staff-members"><strong>First Season Played:</strong> ${profile.firstSeasonPlayed ?? "Not set"}</p>
            </div>

            <div class="staff-card" style="text-align:left;">
              <h2 class="staff-role">Badges</h2>
              ${
                badges.length
                  ? badges.map(badge => `
                    <div style="margin-bottom:14px;">
                      <p class="staff-members" style="font-weight:700;">${badge.name}</p>
                      <p class="staff-members">${badge.description || "No description"}</p>
                    </div>
                  `).join("")
                  : `<p class="staff-members">No badges yet.</p>`
              }
            </div>
          </div>

          <div class="staff-card" style="max-width: 900px; margin: 34px auto 0 auto; text-align:left;">
            <h2 class="staff-role">Inventory</h2>
            ${
              inventory.length
                ? inventory.map(item => `
                  <div style="margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,0.10);">
                    <p class="staff-members" style="font-weight:700;">${item.name} ×${item.quantity}</p>
                    <p class="staff-members">${item.description || "No description"}</p>
                  </div>
                `).join("")
                : `<p class="staff-members">No inventory items yet.</p>`
            }
          </div>
        `;
      } catch (error) {
        profileContent.innerHTML = `
          <h1>Profile</h1>
          <p>Request failed.</p>
          <p>${error}</p>
        `;
      }
    }

    loadProfile();
  </script>
</body>
</html>
