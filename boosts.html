<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boosts - The Fluffy Kingdom</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-logo">The Fluffy Kingdom</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="news.html">News</a>
      <a href="staff.html">Staff</a>
      <a href="support.html">Support</a>
      <a href="ban-appeal.html">Ban Appeal</a>
      <a href="partnerships.html">Partnerships</a>
      <a href="info.html">Info</a>
      <a href="leaderboards.html">Leaderboards</a>
      <a href="profile.html">Profile</a>
      <a href="boosts.html">Boosts</a>
    </nav>
  </header>

  <main class="hero" style="padding-top: 120px; padding-bottom: 80px;">
    <div class="hero-content" id="boostsContent" style="max-width: 1100px;">
      <h1>Boosts</h1>
      <p>Loading boosts data...</p>
    </div>
  </main>

  <script>
    const CORE_API_BASE = "https://core-production-7b06.up.railway.app";
    const boostsContent = document.getElementById("boostsContent");

    function boostTierLabel(tier) {
      if (tier === 3) return "Tier 3";
      if (tier === 2) return "Tier 2";
      if (tier === 1) return "Tier 1";
      return "No Tier";
    }

    async function loadBoosts() {
      try {
        const response = await fetch(`${CORE_API_BASE}/api/boosts`);
        const result = await response.json();

        if (!result.ok) {
          boostsContent.innerHTML = `
            <h1>Boosts</h1>
            <p>Error loading boosts.</p>
            <p>${result.error}${result.details ? " - " + result.details : ""}</p>
          `;
          return;
        }

        const boosters = result.boosters || [];

        boostsContent.innerHTML = `
          <h1>Boosts</h1>
          <p>See the current boost level of the server and the members supporting it.</p>

          <div class="staff-grid" style="margin-top: 34px;">
            <div class="staff-card" style="text-align:center;">
              <h2 class="staff-role">Total Boosts</h2>
              <p class="staff-members" style="font-size: 32px; font-weight: 700;">${result.boostCount}</p>
            </div>

            <div class="staff-card" style="text-align:center;">
              <h2 class="staff-role">Boost Tier</h2>
              <p class="staff-members" style="font-size: 32px; font-weight: 700;">${boostTierLabel(result.boostTier)}</p>
            </div>

            <div class="staff-card" style="text-align:center;">
              <h2 class="staff-role">Boosters</h2>
              <p class="staff-members" style="font-size: 32px; font-weight: 700;">${boosters.length}</p>
            </div>
          </div>

          <div class="staff-card" style="max-width: 950px; margin: 34px auto 0 auto; text-align:left;">
            <h2 class="staff-role">Current Boosters</h2>
            ${
              boosters.length
                ? `<div class="staff-grid" style="margin-top: 22px;">
                    ${boosters.map(booster => `
                      <div class="staff-card" style="text-align:center;">
                        ${booster.avatar ? `<img src="${booster.avatar}" alt="Avatar" style="width:82px;height:82px;border-radius:50%;border:3px solid rgba(255,255,255,0.9);object-fit:cover;margin-bottom:14px;">` : ""}
                        <h3 class="staff-role" style="font-size: 24px;">
                          ${booster.nickname || booster.globalName || booster.username}
                        </h3>
                        <p class="staff-members">@${booster.username}</p>
                      </div>
                    `).join("")}
                  </div>`
                : `<p class="staff-members">No active boosters found.</p>`
            }
          </div>
        `;
      } catch (error) {
        boostsContent.innerHTML = `
          <h1>Boosts</h1>
          <p>Request failed.</p>
          <p>${error}</p>
        `;
      }
    }

    loadBoosts();
  </script>
</body>
</html>
